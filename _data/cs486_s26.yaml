# Canonical source of truth for the CS 486/686 (Spring 2026) course page.
# The Liquid template in cs486-introduction-to-artificial-intelligence-spring2026.html
# and the calendar export at course-cs486-s26.ics both render from this file.
#
# Conventions:
#   - module entries split the schedule into themed bands (rendered as section banner rows).
#   - lecture entries map 1:1 to a deck under /slides/CS486/S26/L<num>/.
#   - special_event entries are non-lecture in-class items rendered with a distinct row style.
#   - no_class entries hold dates that are reserved on the calendar but have no instruction.
#   - final_exam holds the registrar-set exam window.
#   - deadlines is an inline list of badges shown in the Notes column.

