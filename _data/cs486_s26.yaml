# Announcements at the top of the page. Each gets a severity (info / warning / event).
# Order matters: top to bottom. Mark with show:false to hide without deleting.
announcements:
  - severity: info
    show: true
    title: "Assignment 1 deadline extended to Thursday, June 25"
    body: >-
      The Assignment 1 PDF, starter code, and model file have been updated on
      <a href="https://learn.uwaterloo.ca/">LEARN</a> for clarity and consistency
      (Python 3.12+ with NumPy required; clarified TSP wording and A* tie-breaking;
      the EOS convention for fixed-length decoding; the Problem 3 starter API; and a
      refreshed sanity-check model) - please <strong>re-download</strong> the files.
      The deadline is now <strong>Thursday, June 25 at 11:59 PM</strong> (was Jun 18).
      Post A1 questions on
      <a href="https://piazza.com/uwaterloo.ca/spring2026/cs486686">Piazza</a> addressed to
      <strong>Dake Zhang</strong>.
  - severity: info
    show: false
    title: "Chrysalis is back up - Chat 4 & Chat 5 deadlines still extended"
    body: >-
      Chrysalis (the chat-assignment platform) was down earlier today (CSCF server issue) but is
      <strong>back up now</strong>. It will still be offline for the scheduled power outage from
      <strong>Thu Jun 11 (9:30 AM)</strong> to <strong>Fri Jun 12 (12:00 noon)</strong>. The deadline
      extensions stand: <strong>Chat 4 -> Tue Jun 16</strong> and <strong>Chat 5 -> Thu Jun 18</strong>
      (both 11:59 PM).
  - severity: info
    show: true
    title: "Assignment 2: contact Henry Lin with all A2 questions"
    body: >-
      <strong>Henry Lin</strong> is now the point of contact for everything
      <strong>Assignment 2</strong> (Piazza questions and grading). Post A2 questions on
      <a href="https://piazza.com/uwaterloo.ca/spring2026/cs486686">Piazza</a> or email
      <a href="mailto:h293lin@uwaterloo.ca">h293lin@uwaterloo.ca</a>. His weekly
      Thursday 10-11 AM office hours are <strong>cancelled going forward</strong>.
  - severity: info
    show: true
    title: "Assignment 1: contact Dake Zhang with all A1 questions"
    body: >-
      <strong>Dake Zhang</strong> is now the point of contact for everything
      <strong>Assignment 1</strong> (Piazza questions and grading). Post A1 questions on
      <a href="https://piazza.com/uwaterloo.ca/spring2026/cs486686">Piazza</a> or email
