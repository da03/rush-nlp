<header class="site-header">

  <div class="wrapper">

    <a class="site-brand" href="{{ site.baseurl }}/" aria-label="Home">
      <img width="50" height="50" src="/images/waterloo.png" alt="University of Waterloo">
      {% if page.url != "/" %}<span class="site-brand-name">Yuntian Deng</span>{% endif %}
    </a>

    <div class="site-header-actions">
      <button type="button"
              class="theme-toggle"
              data-theme-toggle
              aria-pressed="false"
              aria-label="Switch to dark theme"
              title="Switch to dark theme">
        <svg class="theme-toggle__icon theme-toggle__icon--sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <circle cx="12" cy="12" r="4" fill="currentColor"/>
          <g stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="12" y1="2"  x2="12" y2="5"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="2"  y1="12" x2="5"  y2="12"/>
            <line x1="19" y1="12" x2="22" y2="12"/>
            <line x1="4.6"  y1="4.6"  x2="6.7"  y2="6.7"/>
            <line x1="17.3" y1="17.3" x2="19.4" y2="19.4"/>
            <line x1="4.6"  y1="19.4" x2="6.7"  y2="17.3"/>
            <line x1="17.3" y1="6.7"  x2="19.4" y2="4.6"/>
          </g>
        </svg>
        <svg class="theme-toggle__icon theme-toggle__icon--moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path fill="currentColor" d="M21 13.5A9 9 0 0 1 10.5 3a1 1 0 0 0-1.3-1.2A10 10 0 1 0 22.2 14.8a1 1 0 0 0-1.2-1.3Z"/>
        </svg>
      </button>

      <nav class="site-nav">
        <button type="button" class="menu-icon" aria-label="Toggle navigation" aria-expanded="false" aria-controls="primary-nav">
          <svg viewBox="0 0 18 15" aria-hidden="true">
            <path fill="currentColor" d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.031C17.335,0,18,0.665,18,1.484L18,1.484z"/>
            <path fill="currentColor" d="M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484 h15.031C17.335,6.031,18,6.696,18,7.516L18,7.516z"/>
            <path fill="currentColor" d="M18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
          </svg>
        </button>

        <div class="trigger" id="primary-nav">
          {% assign sorted_pages = site.pages | sort:"weight" %}
          {% for my_page in sorted_pages %}
            {% if my_page.show %}
            <a class="page-link{% if page.url == my_page.url %} active{% endif %}"
               href="{{ my_page.url | prepend: site.baseurl }}"
               {% if page.url == my_page.url %}aria-current="page"{% endif %}>{{ my_page.title }}</a>
            {% endif %}
            {% endfor %}
        </div>
      </nav>
    </div>

  </div>

</header>
