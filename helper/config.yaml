# Content-pack config for the paw-helper framework. The framework's pipeline walks
# this graph; programs.json supplies the compiled IDs.
#
#   /ask {query, page}
#     -> domain_router (page-aware)        -> domain (site | course | neuralos)
#     -> <domain>.classifier               -> a link label or "question"
#        - link label -> return the link (feedback label opens the form)
#        - "question"  -> <domain>.answerer -> validator -> answer / fallback
#
# A domain is only "available" if its classifier + answerer IDs exist in
# programs.json, so this file can describe a domain before it is compiled without
# breaking the live site (it just falls back to the default).

# Content-pack contract version understood by the framework.
schema_version: 1

default_domain: site

# Page key the widget sends -> default domain. The router only overrides this
# when the query clearly belongs to another domain (escape cases).
page_defaults:
  site: site
  "course:cs486_s26": course
  "site:neuralos": neuralos
  "site:paw": pawsite

# Top-level PAGE-AWARE redirect program (optional). The router is fed
# "Page: <label>\nMessage: <query>" and returns the handling domain, so an
# ambiguous/unnamed-subject question stays on the current page and only a clearly
# named other subject escapes. Used only when >1 domain is available.
domain_router: domain_router

# Human-readable page labels fed to the page-aware router, keyed by the page's
# default domain. This is the "site as context" signal: the SAME question (e.g.
# "who are the authors") routes to the current page's project, so it is answered
# by NeuralOS on neural-os.com but by the site on the personal website.
router_page_labels:
  site: "the personal website"
  course: "the CS 486/686 course website"
  neuralos: "the NeuralOS demo"
  pawsite: "the ProgramAsWeights product website"

# Shared answer validator (checks the answer is on-topic for the question).
validator: validator

# Offline tools compiled by compile.py but NOT part of the serving pipeline.
# rubric_checker is the benchmark grader (helper/grader.py); validated against
# helper/bench/grader_meta.yaml before it is trusted to grade the suite.
tools:
  - rubric_checker

# Hierarchical resource routers: when a domain's classifier emits <label>, a fuzzy
# selector picks specific deep links from a rule-supplied candidate list (combine
# rule-based Python + a fuzzy PAW function). Falls back to the plain <label> link
# when nothing matches. Generic hook - slides today, papers/demos later.
resource_routers:
  - domain: course
    label: slides
    program: slide_selector
    provider: course_lectures        # (render candidate list, map ids -> items) in RESOURCE_PROVIDERS
    candidate_label: Lectures
    result_label: "Lecture slides"
    item_description: "Lecture slides"
    max_items: 4
  - domain: pawsite
    label: code                      # classifier emits generic `code`; selector picks python/js/org
    program: code_selector
    provider: pawsite_code
    candidate_label: Repositories
    result_label: "Source code"
    item_description: "Source code repository"
    max_items: 2

# Per-node-role generation budgets.
max_tokens:
  router: 8
  classifier: 8
  answerer: 200
  validator: 4
  selector: 16
  gate: 4          # parallel-branch yes/no gate (legacy; piazza now uses a merge judge)
  merge: 4         # merge judge verdict: main | augment | branch

# Spec + input + output share this context window (PAW constraint). compile.py /
# eval.py assert composed specs (and worst-case course context) stay under it.
token_budget: 2048

# Resilience policy (eval-driven; flip per the ablation numbers).
resilience:
  backtrack: true      # validator "no" or empty answer -> graceful fallback, never a wrong answer
  reconsider: false    # if the routed domain declines, retry the page-default domain once
  multi: false         # (Phase 3) fan out to sub-answerers and aggregate
  aggregator: aggregator

domains:
  site:
    classifier: page_classifier
    links: links.yaml
    answerer: answerer
    facts_mode: baked        # flat answerer: facts compiled in (stable, also the fallback)
    # Real-traffic fix (2026-06-22): "give me a bio of yuntian" was routing to the
    # CV link (a PDF) instead of generating a bio. A bio REQUEST should be answered
    # (bio sub-answerer), so force question; still send explicit CV/resume/PDF asks
    # to the cv link via the unless-list.
    classifier_redundancy:
      - to: question
        from: [cv]
        any_keywords: ["bio", "biography", "about yuntian", "about him"]
        unless_keywords: ["cv", "resume", "curriculum", "pdf", "download"]
    # Hierarchical QA decomposition: a topic router sends detailed PAW/NeuralOS
    # questions to specialized sub-answerers (runtime-injected detailed facts);
    # everything else uses the flat answerer, which is also the backtrack fallback.
    topic_router: site_topic_router
    topics:
      paw: {answerer: paw_answerer, context: paw}
      neuralos: {answerer: neuralos_answerer, context: neuralos}
      students: {answerer: students_answerer, context: students}
      bio: {answerer: bio_answerer, context: bio}
      general: {answerer: answerer}
  course:
    classifier: course_classifier
    links: course_links.yaml
    answerer: course_answerer
    facts_mode: runtime      # facts injected at inference from _data/cs486_s26.yaml (no recompile on edits)
    context: course          # course_facts.retrieve(query) supplies the injected slice
    # Parallel Piazza branch: ONLY on the course page (origin). Runs CONCURRENTLY
    # with the main course pipeline (so it adds ~0 wall time), then the aggregator
    # augments the answer with "Related on Piazza" links (or rescues a decline).
    #
    # RETRIEVE -> RERANK -> ANSWER (Piazza RAG):
    #  - piazza.search (BM25) provides RECALL: top select_k threads over a low
    #    min_score floor that only trims pure noise. A recency query ("latest posts")
    #    instead returns the most-recent threads with keep=True (bypass the reranker).
    #  - piazza_selector (PAW) is PRECISION: shown the question + candidate titles, it
    #    keeps only genuinely-relevant threads (or "none"). A raw BM25 threshold can't
    #    separate true matches from incidental term overlap; a question-aware reranker
    #    can, making the merge robust to retriever false positives.
    #  - piazza_answerer (PAW) SYNTHESIZES a concise answer from the kept threads'
    #    endorsed instructor replies, or declines. When it answers, the aggregator
    #    PROMOTES it to the primary answer (overriding a generic main answer), with
    #    the threads as citation links. Dormant until both programs are compiled.
    parallel_branches:
      - name: piazza
        when_page: "course"
        # OVER-CALL + question-aware MERGE (no up-front topic gate). We always search
        # and synthesize, then piazza_merge decides - from the question + BOTH the
        # course answer and the Piazza answer - whether to keep `main` (course owns it,
        # e.g. office hours / grading -> no hijack), `augment` (main + a Piazza
        # citation), or promote the Piazza answer (`branch`). Having both answers in
        # hand is far more robust than a finetuned yes/no on the query alone.
        provider: piazza
        selector: piazza_selector
        answerer: piazza_answerer
        merge: piazza_merge
        min_score: 2.0       # BM25 recall floor (trim noise); the selector decides relevance
        select_k: 5          # candidates handed to the selector
        max_items: 2         # cap on surfaced threads (citations)
        result_label: "Source on Piazza"   # widget pluralizes to "Sources on Piazza" for >1
  # NeuralOS demo (neural-os.com). Default for page "site:neuralos"; the domain
  # router sends NeuralOS-specific questions to "either" so the page prior holds,
  # while questions about Yuntian / his other projects escape to the site domain.
  # Reuses the existing neuralos_answerer with facts/neuralos.md injected at runtime
  # (incl. the demo-usage facts), so editing those facts needs no recompile.
  neuralos:
    classifier: neuralos_classifier
    links: neuralos_links.yaml
    answerer: neuralos_answerer
    facts_mode: runtime
    context: neuralos        # CONTEXT_PROVIDERS["neuralos"] injects helper/facts/neuralos.md
  # ProgramAsWeights product website (programasweights.com). Default for page
  # "site:paw"; generic questions like "how do I install it" stay on PAW, while
  # clearly personal/course/NeuralOS questions escape through the domain router.
  pawsite:
    classifier: pawsite_classifier
    links: pawsite_links.yaml
    answerer: pawsite_answerer
    facts_mode: runtime
    context: pawsite_core      # flat answerer + fallback get the compact overview
    topic_router: pawsite_topic_router
    # Deterministic safety net for the code cluster the small classifier is shaky
    # on (bare "python sdk" / "javascript sdk" / "npm package"). If it emits
    # question/browser but the query names an SDK/repo/package, prefer `code` (the
    # 100%-accurate code_selector then picks python/js/org). Install/how-to phrasings
    # are excluded so "how do I install the sdk" stays a question.
    classifier_redundancy:
      - to: code
        from: [question, browser]
        any_keywords: [" sdk", "repo", "repository", "github", "source code", " package"]
        # "github" must not force `code` for an OAuth/login phrasing ("log in with github").
        unless_keywords: ["install", "how do i", "how to", "what should", "log in", "sign in", "log into", "sign into", "oauth"]
      # "who built/made this", "who are the authors", "who is the PI" are a WRITTEN
      # answer (the team), never the profile/about/code link. The small classifier is
      # brittle on these common queries across recompiles, so pin them deterministically.
      - to: question
        from: [profile, about, code, hub, settings]
        any_keywords: ["author", "who built", "who made", "who developed", "who created",
                       "who is the pi", "principal investigator", "who is behind", "who runs", "who's behind"]
    # Each sub-answerer gets ONLY its topic's facts slice (facts/pawsite_<topic>.md),
    # so the injected context is small and on-topic - the point of the hierarchy.
    topics:
      install: {answerer: pawsite_install_answerer, context: pawsite_install}
      compile: {answerer: pawsite_compile_answerer, context: pawsite_compile}
      browser: {answerer: pawsite_browser_answerer, context: pawsite_browser}
      accounts: {answerer: pawsite_accounts_answerer, context: pawsite_accounts}
      agents: {answerer: pawsite_agents_answerer, context: pawsite_agents}
      privacy: {answerer: pawsite_privacy_answerer, context: pawsite_privacy}
      examples: {answerer: pawsite_examples_answerer, context: pawsite_examples}
      troubleshooting: {answerer: pawsite_troubleshooting_answerer, context: pawsite_troubleshooting}
      general: {answerer: pawsite_answerer, context: pawsite_core}
