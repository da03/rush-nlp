# nginx vhost for helper.yuntiandeng.com -> the local PAW helper service.
# Install:  sudo cp helper/deploy/helper.nginx.conf /etc/nginx/sites-available/helper.yuntiandeng.com
#           sudo ln -s /etc/nginx/sites-available/helper.yuntiandeng.com /etc/nginx/sites-enabled/
#           sudo nginx -t && sudo systemctl reload nginx
# Then issue TLS:  sudo certbot --nginx -d helper.yuntiandeng.com
# (certbot rewrites this file to add the :443 server block + HTTP->HTTPS redirect.)
#
# CORS is handled by the FastAPI app (Access-Control-Allow-Origin: yuntiandeng.com),
# so nginx intentionally does not add CORS headers.

server {
    listen 80;
    listen [::]:80;
    server_name helper.yuntiandeng.com;

    # Small JSON requests only.
    client_max_body_size 16k;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # First /ask after a restart may load the base model; allow headroom.
        proxy_read_timeout 60s;
    }
}
