# Meta-benchmark for the rubric_checker PAW grader (Step 1).
#
# Each case is a (question, answer, requirement) triple with a HAND-ASSIGNED gold
# label. gold=yes means the Answer satisfies the Requirement; gold=no means it
# omits / is too vague / declines / or contradicts it. Requirements are POSITIVE
# (things the answer should do), including "declines X" requirements; negative
# "must NOT say X" checks are handled separately (rule-based), not by this grader.
#
# These are held out from specs/rubric_checker.txt (different content) so the meta
# score reflects generalization. `note` records why I labeled it that way - reread
# it when eyeballing grader disagreements.
#
# RUBRIC-AUTHORING GUIDELINE (lesson learned 2026-06-22): write each requirement as
# ONE clean clause. The small rubric_checker false-negatives on compound subjects
# joined by a slash or "or" of two NOUN categories, e.g. "Names at least one PAW
# author/team member" or "...author or team member" both score NO even for a correct
# naming answer, while "Names at least one of the PAW authors (e.g. X or Y)" scores
# YES. Synonym slashes inside a noun ("tiny/local", "and/or", "X/Twitter") are fine.
# Prefer "Names at least one of <list>" over "Names a <catA>/<catB>".

