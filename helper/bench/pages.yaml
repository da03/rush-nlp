# Page-classifier benchmark: query -> expected output (a link label or "question").
# Auto-graded by eval.py. Covers link routing, the link-vs-question split, and
# hard negatives.
#
# IMPORTANT: these queries are intentionally HELD OUT - they are paraphrases that
# do NOT appear verbatim in helper/specs/page_classifier.txt, so the score
# reflects generalization rather than memorization.

# --- CV ---
- {query: "do you have a cv I can look at", expected: cv}
- {query: "send me your resume", expected: cv}
- {query: "is your cv online", expected: cv}

# --- contact ---
- {query: "what's the best way to contact you", expected: contact}
- {query: "i want to write you an email", expected: contact}
- {query: "can I get your email", expected: contact}

# --- teaching (course page) ---
- {query: "which course do you run this semester", expected: teaching}
- {query: "page for your AI course", expected: teaching}
- {query: "where's the cs486 syllabus", expected: teaching}

# --- publications ---
- {query: "where can I read your papers", expected: publications}
- {query: "full list of your research papers", expected: publications}

# --- demos ---
- {query: "any live demos to try", expected: demos}
- {query: "your demo gallery", expected: demos}

# --- scholar / github / socials ---
- {query: "find you on google scholar", expected: scholar}
- {query: "your citation metrics", expected: scholar}
- {query: "your code repositories", expected: github}
- {query: "do you have a github account", expected: github}
- {query: "do you have twitter", expected: x}
- {query: "your x handle", expected: x}
- {query: "where can I find your linkedin", expected: linkedin}
- {query: "your semantic scholar author page", expected: semantic_scholar}

# --- projects as links (open/visit/download framing) ---
- {query: "i want to try program as weights", expected: programasweights}
- {query: "show me the neuralos demo", expected: neuralos}
- {query: "get the wildchat data", expected: wildchat}
- {query: "explore the wildchat logs online", expected: wildvisualizer}
- {query: "search wildchat conversations", expected: wildvisualizer}

# --- feedback ---
- {query: "i found a problem with the site", expected: feedback}
- {query: "i'd like to give you some feedback", expected: feedback}

# --- questions (must NOT route to a link) ---
- {query: "what's your current research about", expected: question}
- {query: "which school gave you your doctorate", expected: question}
- {query: "are you accepting phd applicants", expected: question}
- {query: "how can I work with you", expected: question}
- {query: "what's your age", expected: question}
- {query: "explain what neuralos is", expected: question}
- {query: "give me an overview of wildchat", expected: question}
- {query: "tell me who you are", expected: question}
- {query: "what's the weather in paris", expected: question}
- {query: "what's your favorite food", expected: question}
