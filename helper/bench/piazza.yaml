# Piazza branch benchmark for CS 486/686. Retrieve-then-rerank, four suites:
#
#   retrieval  - recall@k: BM25 should rank the right real thread into the top-k
#                (needs the server-only threads.json synced).
#   selection  - precision: given the question + candidate TITLES, piazza_selector
#                returns exactly the relevant ones (or none). Unit-tests the PAW
#                reranker directly with real thread titles as candidates.
#   e2e        - full pipeline on the course page: does it surface "Related on
#                Piazza" when it should, and stay invisible otherwise?
#   privacy    - must-not-surface: the served index must NEVER contain a private
#                thread, and adversarial queries that mimic private-thread topics
#                must not surface @61-@64 (verified private via piazza_sync --inspect).
#
# Queries are HELD OUT: paraphrases, never the verbatim Piazza subject, so scores
# reflect generalization rather than string overlap. thread_id values are the real
# @numbers from the live class (see piazza_sync output), grounded by eyeballing the
# actual instructor content on 2026-06-24.

# --- Selection precision: question + candidate titles -> the relevant ones -----
# `candidates` are thread titles (1-indexed); `expect` is the list of titles the
# selector should pick ([] means it must return "none"). The false candidates are
# real titles that a recall-only retriever could plausibly surface, so this tests
# that the reranker rejects topical-but-irrelevant threads.
selection:
  - query: "what arithmetic can I use in the cost function for lowest cost first search"
    candidates: ["A1 Q3.3 - What arithmetic allowed in cost function for LCFS", "Final Project Group Formation", "A1 Q2"]
    expect: [1]
  - query: "is the end of sequence token probability automatically one in question 3"
    candidates: ["A1Q3", "A1 Q3 definition", "Download lectures"]
    expect: [1]
  - query: "what is the difference between uniform cost search and lowest cost first search"
    candidates: ["Uniform-Cost Search vs Lowest Cost First Search", "A1 Q3.3 - What arithmetic allowed in cost function for LCFS", "A1 Q2"]
    expect: [1]
  - query: "the chat submission server seems to be having problems"
    candidates: ["Chrysalis is down", "Chrysalis outage - Chat 4 and Chat 5 deadlines extended", "A1 Q3"]
    expect: [1, 2]
  # gate-like negatives: the selector must reject topical-but-irrelevant candidates
  - query: "how is the course graded"
    candidates: ["Assignment 1 contact + office hours update", "A1 Q3 definition", "Final Project Group Formation"]
    expect: []
  - query: "how does alpha-beta pruning skip branches"
    candidates: ["A1 Q2 clarification", "Uniform-Cost Search vs Lowest Cost First Search", "Download lectures"]
    expect: []
  - query: "what topics are on the midterm"
    candidates: ["Final Project Group Formation", "A1 Q3", "Question About Autograder Feedback"]
    expect: []
  - query: "are you accepting new phd students"
    candidates: ["A1 Q2", "Final Project Group Formation"]
    expect: []

# --- Retrieval recall@k: paraphrase -> the real thread it should rank ----------
# expect_thread may be a single id or a list (any one in top-k counts as a hit).
retrieval:
  - {query: "how do I pick a cost function for lowest-cost-first search in assignment 1", expect_thread: 66, k: 3}
  - {query: "is the EOS token probability automatically one in A1 question 3", expect_thread: 67, k: 3}
  - {query: "can the graph go back on itself in A1 Q1b", expect_thread: 53, k: 3}
  - {query: "what makes an admissible heuristic for question 2 part c", expect_thread: [42, 46], k: 3}
  - {query: "uniform cost search versus lowest cost first search", expect_thread: 14, k: 3}
  - {query: "where can I download the lecture slides", expect_thread: 29, k: 3}
  - {query: "tie breaking rule in the question 3 coding portion", expect_thread: 34, k: 3}
  - {query: "the autograder feedback for the chat assignment looks off", expect_thread: 28, k: 3}
  - {query: "is chrysalis currently down", expect_thread: [36, 38, 8, 15], k: 3}
  - {query: "was assignment 1 extended by a week", expect_thread: [44, 38], k: 3}
  - {query: "how do I form a final project group", expect_thread: 10, k: 3}
  - {query: "did hala move her office hours", expect_thread: [30, 37], k: 3}

# --- End-to-end triggering precision: does the course page surface Piazza? ----
# Runs the FULL pipeline on the course page (gate -> search -> min_score -> aggregate).
# expect_piazza true  = a strong content match should attach "Related on Piazza".
# expect_piazza false = either the gate says no (static logistics) OR the gate says
#   yes but nothing clears min_score (a topic not yet on Piazza) -> stay invisible.
e2e:
  - {query: "how do I choose a cost function for lowest cost first search in a1", expect_piazza: true}
  - {query: "is the eos token probability one in question 3", expect_piazza: true}
  - {query: "uniform cost search versus lowest cost first search", expect_piazza: true}
  - {query: "how is the course graded", expect_piazza: false}        # gate: no (static)
  - {query: "who are the teaching assistants", expect_piazza: false} # gate: no (static)
  - {query: "how does alpha beta pruning skip branches", expect_piazza: false}  # gate yes, no match clears min_score
  - {query: "what topics are on the midterm", expect_piazza: false}  # gate yes, weak match filtered

# --- Privacy: the served index must never carry private threads ---------------
# private_ids were confirmed private (status=private / instr feed_groups) via
# piazza_sync --inspect; they must never appear in threads.json or in any search
# result. The adversarial queries mimic private-thread topics to try to surface them.
privacy:
  private_ids: [61, 62, 63, 64]
  adversarial:
    - "private question about my assignment 1 submission"
    - "can you look at my specific code for the chat assignment"
    - "I emailed the instructors about my grade"
