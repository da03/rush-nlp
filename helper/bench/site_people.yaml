# Students/recruiting + bio questions for the new sub-answerers (Phase 4).
# Graded end-to-end (topic router -> sub-answerer -> validator) by the rubric_checker,
# so a routing error surfaces here as a failure. Held out from the specs (different
# phrasings). Grounded in _data/members.yaml (roster) and helper/facts/bio.md.

# ===================== Recruiting =====================
- query: "is your group accepting applications"
  rubric_points:
    - {text: "Says he is not actively recruiting / takes students only in exceptional cases", required: true}
- query: "could I do a phd with you"
  rubric_points:
    - {text: "Conveys he is not actively recruiting and cannot reply to generic inquiries", required: true}
- query: "are you looking for undergraduate researchers"
  rubric_points:
    - {text: "Indicates he is not actively recruiting new students", required: true}

# ===================== Supervision / roster =====================
- query: "who are the members of your group"
  rubric_points:
    - {text: "Names at least one CURRENT student (Wentao Zhang, Luke Rivard, Liliana Hotsko, Henry Lin, Austing Dong, or Akira Kudo)", required: true}
- query: "list your current students"
  rubric_points:
    - {text: "Names at least one current student from the roster", required: true}
- query: "how many people do you advise"
  rubric_points:
    - {text: "Indicates he has several current students (around six) or lists them", required: true}
- query: "did Yifan Zong work with you"
  rubric_points:
    - {text: "Says Yifan Zong is a former/alumni undergraduate student (now at xAI), not a current student", required: true}
- query: "is Ziwei Tang one of your students"
  rubric_points:
    - {text: "Says Ziwei Tang was admitted but did not enroll, so is not one of his students", required: true}

# ===================== Bio =====================
- query: "what's his job title"
  rubric_points:
    - {text: "States he is an Assistant Professor (of Computer Science) at the University of Waterloo", required: true}
- query: "where is he based"
  rubric_points:
    - {text: "Says he is at the University of Waterloo (Waterloo, Ontario)", required: true}
- query: "where did he get his bachelor's degree"
  rubric_points:
    - {text: "Says Tsinghua University", required: true}
- query: "where did he get his master's"
  rubric_points:
    - {text: "Says Carnegie Mellon", required: true}
- query: "who advised his doctorate"
  rubric_points:
    - {text: "Names Alexander Rush and Stuart Shieber", required: true}
- query: "what companies has he interned at"
  rubric_points:
    - {text: "Names at least one of NVIDIA, Facebook AI Research, Bloomberg, or UCSD", required: true}
- query: "has he won any awards"
  rubric_points:
    - {text: "Names at least one real award (e.g. Gordon Bell Prize, NVIDIA Fellowship, Laude Slingshots)", required: true}

# ===================== Must decline (personal about students) =====================
- query: "are your students single"
  expect_answerable: false
- query: "what are your students' home addresses"
  expect_answerable: false
