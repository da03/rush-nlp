# NeuralOS-demo freeform-answer benchmark (neural-os.com). Mirrors
# bench/course_questions.yaml: AUTO-graded factual cases (expected_any/all),
# rubric-graded open-ended cases (rubric_points), and must-decline cases.
#
# Grounded in helper/facts/neuralos.md PLUS the demo-usage facts added for the
# demo context (how to interact: the blue box, mouse/click/keyboard; why it can
# be slow/imperfect). These are what a confused/curious visitor to the live demo
# would actually ask.
#
# IMPORTANT: queries are held out (paraphrases not verbatim in the specs/facts).

# ============================ AUTO-GRADED (factual) ============================

- query: "what architecture does neuralos use"
  expected_all: ["RNN", "diffusion"]                 # RNN (state) + diffusion renderer

- query: "how does it deal with the mouse cursor"
  expected_any: ["Gaussian"]                          # cursor (x,y) as a Gaussian spatial map

- query: "can it run doom"
  expected_any: ["Doom"]                              # learned to launch/play Doom from synthetic data

- query: "what resolution does it run at"
  expected_any: ["512", "1024", "256"]               # 256 (2024) / 512x384 (2025) / 1024x768 (2026)

- query: "who created neuralos"
  expected_any: ["Rivard", "Deng"]                   # authors incl. Luke Rivard, Yuntian Deng

- query: "what was it trained on"
  expected_any: ["random", "120,000", "2,000", "demonstration"]

# ===================== OPEN-ENDED (rubric_points, grader-scored) ==============

- query: "what is this"
  rubric: "On the demo, 'what is this' = NeuralOS: a neural model that generates/simulates an OS, every pixel from a neural net."
  rubric_points:
    - {text: "Describes NeuralOS as a neural model that simulates/generates an operating system (pixels generated by a neural network)", required: true}

- query: "what am I looking at"
  rubric: "Same: should identify the NeuralOS demo, not ask for clarification."
  rubric_points:
    - {text: "Identifies this as NeuralOS, a neural-network-generated operating system / interface", required: true}

- query: "how does it work"
  rubric_points:
    - {text: "Mentions an RNN tracking OS state and a diffusion renderer generating frames, run autoregressively", required: true}

- query: "is this a real operating system"
  rubric_points:
    - {text: "Says no - it is a neural generative model with no real kernel or installed applications; the screen is generated by a neural network", required: true}

- query: "how do I use this"
  rubric: "Demo controls: move the mouse inside the box to interact, click, and type."
  rubric_points:
    - {text: "Explains you interact by moving the mouse inside the interaction box and clicking/typing", required: true}

- query: "how do I interact with the demo"
  rubric_points:
    - {text: "Says to move the mouse in the box, click, and use the keyboard", required: true}

- query: "why is it so slow"
  rubric: "Each frame is generated by a neural network (diffusion), so it can be slow / imperfect."
  rubric_points:
    - {text: "Explains that each frame is generated by a neural network (diffusion model), so it can be slow or imperfect", required: true}

- query: "who made this"
  rubric_points:
    - {text: "Names at least one author (e.g. Luke Rivard, Yuntian Deng) or the University of Waterloo / NRC", required: true}

- query: "what can it do"
  rubric_points:
    - {text: "Says it responds to user input (mouse/click/keyboard) and can even launch/play Doom learned from synthetic demonstrations", required: true}

- query: "how was it trained"
  rubric_points:
    - {text: "Mentions training on agent demonstrations plus random-exploration demonstrations", required: true}

- query: "why does this matter"
  rubric: "Big idea: anything you can demonstrate (even synthetically) can become a usable interface; a fully generative UI."
  rubric_points:
    - {text: "Conveys that anything demonstrable can become an interface / the vision of a fully generative UI", required: true}

# ===================== Should decline gracefully (not in facts) ===============

- query: "how many gpus does it need to run"
  rubric: "Hardware not stated in the facts; must decline, not invent."
  expect_answerable: false

- query: "what gpu do I need to run it myself"
  expect_answerable: false

- query: "how much does it cost to use"
  expect_answerable: false

- query: "what is the exact latency in milliseconds per frame"
  expect_answerable: false

- query: "what programming language is it written in"
  expect_answerable: false
