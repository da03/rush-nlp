# ProgramAsWeights product-site freeform benchmark (programasweights.com).
# Grounded in helper/facts/pawsite.md. Link requests belong in pawsite_pages.yaml;
# this file grades answers that should be returned in words.

# ============================ AUTO-GRADED (factual) ============================

- query: "what compiler should I use for the browser"
  expected_all: ["paw-4b-gpt2", "browser"]

- query: "what is the python install command"
  expected_all: ["pip install programasweights", "pypi.programasweights.com"]

- query: "what npm package should I install"
  expected_any: ["@programasweights/web"]

- query: "how many compile requests can I make anonymously"
  expected_all: ["20", "hour"]

- query: "how do I force CPU if GPU breaks"
  expected_any: ["PAW_GPU_LAYERS=0", "n_gpu_layers=0"]

# ===================== OPEN-ENDED (rubric_points, grader-scored) ==============

- query: "what is paw"
  rubric_points:
    - {text: "Says ProgramAsWeights compiles natural-language specs into tiny/local neural functions", required: true}
    - {text: "Mentions the one text input to one text output stateless function interface", required: false}

- query: "when should I use it instead of regex"
  rubric_points:
    - {text: "Says PAW is for fuzzy text tasks where regex is too brittle but a full LLM per input is overkill", required: true}

- query: "how do I write a good spec"
  rubric_points:
    - {text: "Says to use realistic Input/Output examples and constrain the output format", required: true}
    - {text: "Says to iterate with test cases / inspect failures / retest", required: true}

- query: "standard vs compact"
  rubric_points:
    - {text: "Identifies Standard as the current higher-accuracy default", required: true}
    - {text: "Identifies Compact as smaller and browser-compatible via WebAssembly", required: true}

- query: "does inference run locally"
  rubric_points:
    - {text: "Says compile uses the hosted PAW API but inference usually runs locally through the SDK after download", required: true}
    - {text: "Mentions inference can work offline after first download", required: false}

- query: "how can I use paw in an agent"
  rubric_points:
    - {text: "Mentions agent preprocessing such as parsing tool calls, validating outputs, routing tasks, classification, or structured-format repair", required: true}

- query: "what can I use paw for"
  rubric_points:
    - {text: "Names at least two real use cases such as classification, extraction, format repair, fuzzy search, log triage, intent routing, or agent preprocessing", required: true}

- query: "why am I getting http 429"
  rubric_points:
    - {text: "Explains HTTP 429 as hosted compile API rate limiting and suggests waiting or signing in for higher limits", required: true}

