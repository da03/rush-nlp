# ProgramAsWeights product-site classifier benchmark (page key `site:paw`).
# Held-out paraphrases (NOT verbatim in specs/pawsite_classifier.txt).
#
# Taxonomy (14 labels): playground hub browser docs settings agents profile about
# privacy terms code alien avatar feedback  (+ "question").
# Policy: license/is-it-free/how-to-install -> question (answered inline);
# source code/repos/sdk -> code (a fuzzy code_selector then picks python/js/org);
# get-started/learn -> docs; contact/email/praise/bug -> feedback.

# ---- synthetic held-out paraphrases ----
- {query: "I want to compile a program", expected: playground}
- {query: "make a new classifier", expected: playground}
- {query: "show me community programs", expected: hub}
- {query: "find a program someone already compiled", expected: hub}
- {query: "run in the browser", expected: browser}
- {query: "webassembly demo", expected: browser}
- {query: "documentation", expected: docs}
- {query: "api reference", expected: docs}
- {query: "read the full docs", expected: docs}
- {query: "I need an API key", expected: settings}
- {query: "manage my account", expected: settings}
- {query: "use with cursor", expected: agents}
- {query: "my programs", expected: profile}
- {query: "the about page", expected: about}
- {query: "report a bug", expected: feedback}
- {query: "I have a suggestion", expected: feedback}
- {query: "what languages are supported", expected: question}
- {query: "standard vs compact", expected: question}
- {query: "is my data private", expected: question}
- {query: "how do I write a good spec", expected: question}

