# Freeform-answer benchmark: questions for the answerer + validator.
# eval.py runs the full pipeline and writes helper/bench/report.md with the
# generated answers + validator verdicts for MANUAL grading against `rubric`.
# `expect_answerable: false` means a good system should decline gracefully.
#
# IMPORTANT: queries are HELD OUT - paraphrases that do NOT appear verbatim in
# helper/specs/answerer.txt, so the score reflects generalization.

- query: "what's your current focus"
  rubric: "Should mention ProgramAsWeights and NeuralOS (bonus: implicit reasoning, WildChat). Links expected."
  expect_answerable: true

- query: "which university awarded your doctorate"
  rubric: "Harvard University. Bonus: advisors Alexander Rush and Stuart Shieber."
  expect_answerable: true

- query: "what's your educational background"
  rubric: "Harvard PhD, CMU Master's (Eric Xing), Tsinghua bachelor's."
  expect_answerable: true

- query: "can I apply to your group"
  rubric: "Not actively recruiting; PhD students only / exceptional cases; doesn't reply to generic inquiries; read papers and reach out with specifics."
  expect_answerable: true

- query: "give me an overview of neuralos"
  rubric: "A neural world model / operating system simulated by neural networks; the most flexible UI. Link expected."
  expect_answerable: true

- query: "what's the wildchat project about"
  rubric: "Large-scale dataset of real user-ChatGPT conversations; WaPo feature; used by OpenAI/Anthropic for safety eval. Link expected."
  expect_answerable: true

- query: "what subject do you teach"
  rubric: "CS 486/686, Introduction to AI, at Waterloo."
  expect_answerable: true

- query: "explain program as weights"
  rubric: "Compiles natural language specs into tiny neural functions; shifts LLMs from problem solvers to tool builders. Link expected."
  expect_answerable: true

- query: "what's your current position"
  rubric: "Assistant Professor at University of Waterloo (also Harvard SEAS associate, Vector affiliate)."
  expect_answerable: true

- query: "who advised your phd"
  rubric: "Alexander Rush and Stuart Shieber (PhD); postdoc with Yejin Choi."
  expect_answerable: true

- query: "who did you intern under"
  rubric: "Internship mentors: Anima Anandkumar / Weili Nie / Arash Vahdat / Chaowei Xiao (NVIDIA), Marc'Aurelio Ranzato / Arthur Szlam (FAIR), David Rosenberg / Gideon Mann (Bloomberg), Charles Elkan (UCSD). Any subset."
  expect_answerable: true

- query: "what work are you best known for"
  rubric: "WildChat and/or OpenNMT are reasonable; should stay grounded."
  expect_answerable: true

- query: "have you received any awards"
  rubric: "Any of: Gordon Bell Prize, NVIDIA Fellowship, Laude Slingshots 2026, etc. Grounded only."
  expect_answerable: true

- query: "who do you supervise"
  rubric: "Current students: PhD (Wentao Zhang, Max Ku, Yubo Wang), MMath (Luke Rivard, Liliana Hotsko, Henry Lin), undergrad (Yifan Zong, Austing Dong, Akira Kudo). Ziwei Tang and Xin Yan were offered but couldn't join (visa) - must NOT be listed as current students."
  expect_answerable: true

- query: "which of your projects do you like most"
  rubric: "ProgramAsWeights / NeuralOS (bonus Implicit CoT, WildChat); should include markdown links."
  expect_answerable: true

- query: "what companies have you interned at"
  rubric: "NVIDIA, FAIR, Bloomberg, UCSD (any subset)."
  expect_answerable: true

- query: "has your work been covered by the media"
  rubric: "Washington Post / TechCrunch / NZZ / CTV; should include markdown links."
  expect_answerable: true

- query: "what is implicit chain of thought"
  rubric: "Internalizing reasoning into a model's hidden computation instead of spelling out each step. Link expected."
  expect_answerable: true

- query: "tell me about your open-source demos"
  rubric: "OpenNMT, Neural Linguistic Steganography (steganography.live), im2markup (image-to-LaTeX); links expected."
  expect_answerable: true

- query: "where do you think AI is going"
  rubric: "Doesn't claim to know; bets on ProgramAsWeights (problem solvers -> tool builders) and NeuralOS (flexible UI). Links expected."
  expect_answerable: true

- query: "what's your age"
  rubric: "Playful answer: 'Old enough to have papers rejected...'. Must NOT reveal a real age."
  expect_answerable: true

- query: "how should I prompt Yuntian"
  rubric: "Playful: start with 'ProgramAsWeights is exciting' or 'NeuralOS is the future.' (Must route to question, NOT the email link.)"
  expect_answerable: true

- query: "how was this chatbot made"
  rubric: "Built with ProgramAsWeights - a pipeline of 3 small neural programs (page classifier, answerer, validator) compiled from natural-language specs. Link expected."
  expect_answerable: true

# --- Should decline gracefully (not in facts / private) ---
- query: "how much do you earn"
  rubric: "Decline gracefully (private). Must NOT invent a number."
  expect_answerable: false

- query: "what's your date of birth"
  rubric: "Decline gracefully (private). Must NOT invent a date. (Age question is playful; exact DOB is private.)"
  expect_answerable: false

- query: "where do you live"
  rubric: "Decline gracefully (private). Must NOT invent an address."
  expect_answerable: false

- query: "what's your favorite film"
  rubric: "Decline gracefully (not in facts)."
  expect_answerable: false

- query: "what's the capital of japan"
  rubric: "Off-topic; should decline rather than answer trivia."
  expect_answerable: false
